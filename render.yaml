services:
  - type: web
    name: sku-performance-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -u app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SKU_APP_SOURCE
        value: supabase
      - key: SKU_APP_CACHE_SECONDS
        value: 900
      - key: HOST
        value: 0.0.0.0
