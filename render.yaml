services:
  - type: web
    name: sku-performance-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -u app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SKU_APP_SOURCE
        value: google
      - key: GOOGLE_SHEET_ID
        value: 17fj9gaoE4U5_Ks_EkI68CPBBPIjjbDYMkifG1SqbBAg
      - key: SKU_APP_CACHE_SECONDS
        value: 900
      - key: HOST
        value: 0.0.0.0
