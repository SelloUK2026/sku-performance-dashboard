<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SKU Performance</title>
    <link rel="stylesheet" href="/styles.css?v=20260703-sidebar">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>SKU Performance</h1>
        <p id="metaLine">Loading workbook...</p>
      </div>
      <div class="search">
        <input id="skuSearch" type="search" placeholder="Search SKU or title" autocomplete="off">
        <select id="skuSelect" aria-label="SKU"></select>
      </div>
    </header>

    <main>
      <section class="product-strip">
        <div class="image-frame">
          <img id="productImage" alt="" referrerpolicy="no-referrer">
        </div>
        <div class="product-copy">
          <p id="skuCode" class="eyebrow"></p>
          <h2 id="productTitle">Select a SKU</h2>
          <p id="productMeta"></p>
        </div>
      </section>

      <section class="kpi-grid" id="kpiGrid"></section>

      <section class="split platform-price-row">
        <div class="platform-grid" id="platformGrid"></div>
        <aside class="right-stack">
          <div class="panel">
            <div class="panel-head">
              <h3>Price Test</h3>
              <button id="resetPrice">Reset</button>
            </div>
            <div class="price-form">
              <label>Price <input id="priceInput" type="number" step="0.01"></label>
              <label>COGS <input id="cogsInput" type="number" step="0.01"></label>
              <label>Freight <input id="freightInput" type="number" step="0.01"></label>
              <label>Commission &amp; Other Expense % <input id="commissionInput" type="number" step="0.01"></label>
            </div>
            <p class="subtle fixed-charge-note">Includes fixed 8% WMS charge.</p>
            <div class="price-result">
              <div><span>Profit</span><strong id="testProfit">-</strong></div>
              <div><span>Margin</span><strong id="testMargin">-</strong></div>
            </div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h3>Stock And Price History</h3>
            </div>
            <div class="table-wrap compact-wrap">
              <table class="history-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Stock</th>
                    <th>Price</th>
                  </tr>
                </thead>
                <tbody id="priceHistoryRows"></tbody>
              </table>
            </div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h3>Monthly Sales And Margin</h3>
            </div>
            <canvas id="monthChart" height="220"></canvas>
          </div>
        </aside>
      </section>
    </main>

    <script src="/app.js?v=20260703-search-autoload"></script>
  </body>
</html>
